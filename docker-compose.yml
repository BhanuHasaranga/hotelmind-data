# HotelMind Data Engineering Stack
# Services: Warehouse PostgreSQL · MinIO (S3) · Airflow (webserver + scheduler)
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Reset:  docker compose down -v  (destroys volumes)

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.12
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    # Local dev key — generate a real one for production:
    # python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
    AIRFLOW__CORE__FERNET_KEY: "81HqDtbfup0W5cv4NiEksmQ8mUEBBekSDzRToMGSgpM="
    _PIP_ADDITIONAL_REQUIREMENTS: "psycopg2-binary>=2.9,<3.0 boto3>=1.34,<2.0 great-expectations>=0.18,<1.0 dbt-core>=1.8,<2.0 dbt-postgres>=1.8,<2.0 pydantic-settings>=2.0,<3.0"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    # Source DB connection (operational)
    SOURCE_DB_HOST: ${SOURCE_DB_HOST:-host.docker.internal}
    SOURCE_DB_PORT: ${SOURCE_DB_PORT:-5432}
    SOURCE_DB_NAME: ${SOURCE_DB_NAME:-hotelmind_db}
    SOURCE_DB_USER: ${SOURCE_DB_USER:-hotelmind}
    SOURCE_DB_PASSWORD: ${SOURCE_DB_PASSWORD:-hotelmind_secret}
    # Warehouse DB connection
    WAREHOUSE_DB_HOST: warehouse-db
    WAREHOUSE_DB_PORT: "5432"
    WAREHOUSE_DB_NAME: ${WAREHOUSE_DB_NAME:-hotelmind_warehouse}
    WAREHOUSE_DB_USER: ${WAREHOUSE_DB_USER:-hotelmind_dw}
    WAREHOUSE_DB_PASSWORD: ${WAREHOUSE_DB_PASSWORD:-hotelmind_dw_secret}
    # MinIO / S3
    S3_ENDPOINT_URL: http://minio:9000
    S3_ACCESS_KEY: ${S3_ACCESS_KEY:-hotelmind_minio}
    S3_SECRET_KEY: ${S3_SECRET_KEY:-hotelmind_minio_secret}
    S3_BUCKET_RAW: ${S3_BUCKET_RAW:-hotelmind-raw}
    S3_BUCKET_PROCESSED: ${S3_BUCKET_PROCESSED:-hotelmind-processed}
    # dbt
    DBT_PROFILES_DIR: /opt/airflow/dbt
    DBT_PROJECT_DIR: /opt/airflow/dbt
  volumes:
    - ./orchestration/dags:/opt/airflow/dags
    - ./dbt:/opt/airflow/dbt
    - ./etl:/opt/airflow/etl
    - ./config:/opt/airflow/config
    - ./quality:/opt/airflow/quality
    - airflow_logs:/opt/airflow/logs
  depends_on:
    airflow-db:
      condition: service_healthy
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  # ── Warehouse PostgreSQL ─────────────────────────────────────────────────────
  warehouse-db:
    image: postgres:16-alpine
    container_name: hotelmind_warehouse_db
    environment:
      POSTGRES_USER: ${WAREHOUSE_DB_USER:-hotelmind_dw}
      POSTGRES_PASSWORD: ${WAREHOUSE_DB_PASSWORD:-hotelmind_dw_secret}
      POSTGRES_DB: ${WAREHOUSE_DB_NAME:-hotelmind_warehouse}
    ports:
      - "5433:5432"
    volumes:
      - warehouse_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WAREHOUSE_DB_USER:-hotelmind_dw}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO (S3-compatible Data Lake) ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: hotelmind_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-hotelmind_minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-hotelmind_minio_secret}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO bucket initializer (one-shot) ──────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: hotelmind_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-hotelmind_minio} ${S3_SECRET_KEY:-hotelmind_minio_secret};
      mc mb --ignore-existing local/${S3_BUCKET_RAW:-hotelmind-raw};
      mc mb --ignore-existing local/${S3_BUCKET_PROCESSED:-hotelmind-processed};
      echo 'MinIO buckets ready.';
      "
    restart: "no"

  # ── Airflow metadata DB ──────────────────────────────────────────────────────
  airflow-db:
    image: postgres:16-alpine
    container_name: hotelmind_airflow_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5434:5432"
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Airflow DB init (one-shot) ───────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: hotelmind_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname HotelMind \
          --lastname Admin \
          --role Admin \
          --email admin@hotelmind.ai
    restart: "no"

  # ── Airflow Webserver ────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: hotelmind_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Airflow Scheduler ────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: hotelmind_airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$(hostname)\""]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  warehouse_data:
  minio_data:
  airflow_db_data:
  airflow_logs:
